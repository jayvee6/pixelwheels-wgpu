<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pixel Wheels — WebGPU</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><text y='14' font-size='14'>🏎️</text></svg>" />
    <style>
      html, body { margin: 0; height: 100%; background: #1a1a1a; overflow: hidden; }
      #app { position: fixed; inset: 0; }
      canvas { display: block; width: 100%; height: 100%; }
      #hud {
        position: fixed; top: 12px; left: 12px; color: #fff;
        font: 14px/1.4 ui-monospace, Menlo, monospace; text-shadow: 0 1px 2px #000;
        pointer-events: none; white-space: pre;
      }
      #err {
        position: fixed; inset: 0; display: none; place-items: center;
        color: #ff6b6b; font: 16px/1.5 ui-monospace, monospace; padding: 24px; text-align: center;
      }
    </style>
  </head>
  <body>
    <div id="app"><canvas id="gpu"></canvas></div>
    <div id="hud"></div>
    <div id="err"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
